<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة فواتير الاسبيرات | الاحترافي المطور</title>

<script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary: #2d3436; --accent: #e67e22; --success: #27ae60;
    --danger: #d63031; --light: #f5f6fa; --blue: #0984e3;
}
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--light); margin: 0; padding: 20px; color: #2d3436; }

.app { max-width: 1250px; margin: auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--accent); }
.header { background: var(--primary); color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
#clock { font-weight: bold; color: var(--accent); font-size: 1.1em; }

.stats { display: flex; gap: 15px; padding: 20px; background: #fff; }
.stat { flex: 1; text-align: center; border: 1px solid #edf2f7; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; position: relative; }
.stat:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
.stat.active { border: 2px solid var(--accent); background: #fffcf9; }
.stat b { font-size: 1.8em; display: block; margin-top: 5px; }

.tools { padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; background: #fafafa; border-bottom: 1px solid #eee; }
input { padding: 12px; border-radius: 10px; border: 1.5px solid #dfe6e9; flex: 1; outline: none; }
input:focus { border-color: var(--accent); }

.btn { padding: 12px 25px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
.add { background: var(--accent); }
.printall { background: var(--primary); }

.table-container { padding: 10px 20px 30px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th { padding: 15px; background: #f8f9fa; color: #636e72; font-size: 0.9em; border-bottom: 2px solid #eee; text-align: right; }
td { padding: 15px; border-bottom: 1px solid #f1f2f6; font-size: 14px; }

.editable { cursor: pointer; border-bottom: 1px dashed #ccc; transition: 0.2s; }
.editable:hover { background: #fff9f4; color: var(--accent); }

.status { padding: 6px 15px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; display: inline-block; }
.done { background: #e3faf3; color: var(--success); }
.wait { background: #fff5eb; color: var(--accent); }

.ctrl { padding: 8px 12px; border: none; color: #fff; border-radius: 8px; cursor: pointer; margin: 2px; font-size: 13px; }
.print-btn { padding: 10px 20px; font-weight: bold; font-size: 14px; min-width: 150px; text-align: right; }
.filename-label { display: block; font-size: 10px; opacity: 0.9; margin-top: 2px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }

@media print {
    .tools, .header, .stats, .ctrl, .status, th:last-child, td:last-child { display: none !important; }
    body { padding: 0; background: #fff; }
    .app { box-shadow: none; border: none; width: 100%; }
    .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
}
.print-header { display: none; }
</style>
</head>

<body>

<div class="app">
    <div class="header">
        <h2><i class="fas fa-tools"></i> نظام فواتير شركة الاسبيرات</h2>
        <div id="clock"></div>
    </div>

    <div class="stats">
        <div class="stat active" id="filter-all" onclick="filterData('all')">الكل <b id="total">0</b></div>
        <div class="stat" id="filter-done" onclick="filterData('done')" style="color:var(--success)">تمت الطباعة <b id="done">0</b></div>
        <div class="stat" id="filter-wait" onclick="filterData('wait')" style="color:var(--danger)">قيد الانتظار <b id="wait">0</b></div>
    </div>

    <div class="tools">
        <input id="invNum" placeholder="رقم الفاتورة">
        <input id="client" placeholder="اسم العميل المستلم">
        <input id="note" placeholder="ملاحظات القطعة / الاسبير">
        <button class="btn add" onclick="upload()"><i class="fas fa-plus-circle"></i> إضافة ورفع</button>

        <div style="flex-basis: 100%; height: 0; margin: 0;"></div> 
        <input id="search" placeholder="بحث سريع في السجل..." onkeyup="search()">
        <button class="btn printall" onclick="window.print()"><i class="fas fa-print"></i> طباعة السجل بالكامل</button>
    </div>

    <div class="print-header">
        <h1>تقرير فواتير شركة الاسبيرات</h1>
        <p>تاريخ التقرير: <span id="reportDate"></span></p>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>رقم الفاتورة</th>
                    <th>العميل</th>
                    <th>الملاحظات</th>
                    <th>الحالة</th>
                    <th>التاريخ</th>
                    <th>خيارات الملف والطباعة</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
    </div>
</div>

<script>
let currentFilter = 'all';

setInterval(() => {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('ar-EG');
    document.getElementById('reportDate').innerText = now.toLocaleDateString('ar-EG');
}, 1000);

const firebaseConfig = {
    apiKey: "AIzaSyBs3OTie7SSJzqWQKgOjUA91BkEZ1919IQ",
    authDomain: "pdfkk-33ecc.firebaseapp.com",
    projectId: "pdfkk-33ecc",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const stack = filestack.init("AnCRzgItUSXu9tSz5Apfjz");

function upload() {
    let invNum = document.getElementById('invNum').value.trim();
    let name = document.getElementById('client').value.trim();
    let note = document.getElementById('note').value.trim();

    stack.picker({
        accept: ['.pdf'],
        displayMode: 'overlay',
        onFileUploadFinished: async (file) => {
            await db.collection("inv").add({
                invNum: invNum || "---",
                name: name || "---",
                note: note || "---",
                url: file.url,
                fileName: file.filename, // حفظ اسم الملف
                status: "wait",
                created: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('invNum').value = "";
            document.getElementById('client').value = "";
            document.getElementById('note').value = "";
        }
    }).open();
}

function replaceFile(id) {
    stack.picker({
        accept: ['.pdf'],
        displayMode: 'overlay',
        onFileUploadFinished: async (file) => {
            await db.collection("inv").doc(id).update({
                url: file.url,
                fileName: file.filename
            });
            alert("تم تحديث الملف بنجاح");
        }
    }).open();
}

function printFile(url, fileName) {
    if(confirm(`هل أنت متأكد من طباعة الملف: ${fileName}؟`)) {
        const win = window.open(url, '_blank');
        win.print();
    }
}

function filterData(status) {
    currentFilter = status;
    document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
    document.getElementById(`filter-${status}`).classList.add('active');
    search(); // إعادة تطبيق البحث والفلترة
}

function search() {
    let v = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll("#body tr").forEach(row => {
        const matchesSearch = row.innerText.toLowerCase().includes(v);
        const matchesFilter = currentFilter === 'all' || row.getAttribute('data-status') === currentFilter;
        row.style.display = (matchesSearch && matchesFilter) ? "" : "none";
    });
}

function confirmToggle(id, currentStatus) {
    const msg = currentStatus === "wait" ? "هل تريد تأكيد إتمام الطباعة؟" : "هل تريد إعادة الفاتورة لوضع الانتظار؟";
    if(confirm(msg)) {
        db.collection("inv").doc(id).update({ status: currentStatus === "wait" ? "done" : "wait" });
    }
}

function quickEdit(id, field, oldValue) {
    let newValue = prompt(`تعديل ${field}:`, oldValue);
    if(newValue !== null) {
        let updateData = {};
        updateData[field] = newValue.trim() || "---";
        db.collection("inv").doc(id).update(updateData);
    }
}

function del(id) {
    if(confirm("هل أنت متأكد من حذف هذه الفاتورة نهائياً؟")) {
        db.collection("inv").doc(id).delete();
    }
}

db.collection("inv").orderBy("created", "desc").onSnapshot(snap => {
    const tbody = document.getElementById('body');
    tbody.innerHTML = "";
    let d = 0, i = 1;

    snap.forEach(doc => {
        let x = doc.data();
        if(x.status === "done") d++;

        const row = document.createElement('tr');
        row.setAttribute('data-status', x.status);
        row.innerHTML = `
            <td>${i++}</td>
            <td class="editable" onclick="quickEdit('${doc.id}', 'invNum', '${x.invNum}')">${x.invNum || "---"}</td>
            <td class="editable" onclick="quickEdit('${doc.id}', 'name', '${x.name}')" style="font-weight:bold;">${x.name || "---"}</td>
            <td class="editable" onclick="quickEdit('${doc.id}', 'note', '${x.note}')" style="color:#636e72;">${x.note || "---"}</td>
            <td>
                <span class="status ${x.status}" onclick="confirmToggle('${doc.id}','${x.status}')">
                    ${x.status === "done" ? "<i class='fas fa-check'></i> تمت" : "<i class='fas fa-clock'></i> انتظار"}
                </span>
            </td>
            <td>${x.created?.toDate ? x.created.toDate().toLocaleDateString('ar-EG') : "-"}</td>
            <td style="display: flex; align-items: center; gap: 5px;">
                <button class="ctrl print-btn" style="background:var(--success)" onclick="printFile('${x.url}','${x.fileName || 'ملف غير مسمى'}')" title="طباعة">
                    <i class="fas fa-print"></i> طباعة الفاتورة
                    <span class="filename-label">${x.fileName || 'بدون اسم'}</span>
                </button>
                <button class="ctrl" style="background:var(--blue)" onclick="replaceFile('${doc.id}')" title="استبدال الملف"><i class="fas fa-sync-alt"></i></button>
                <button class="ctrl" style="background:var(--primary)" onclick="window.open('${x.url}','_blank')" title="فتح"><i class="fas fa-external-link-alt"></i></button>
                <button class="ctrl" style="background:var(--danger)" onclick="del('${doc.id}')" title="حذف"><i class="fas fa-trash"></i></button>
            </td>
        `;
        tbody.appendChild(row);
    });

    document.getElementById('total').innerText = snap.size;
    document.getElementById('done').innerText = d;
    document.getElementById('wait').innerText = snap.size - d;
    search(); // تحديث العرض حسب الفلتر الحالي
});
</script>

</body>
</html>
