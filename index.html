<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة فواتير الاسبيرات</title>

<script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary:#2d3436;
    --accent:#e67e22;
    --success:#27ae60;
    --danger:#d63031;
    --light:#f5f6fa;
}
body {font-family:Tahoma;background:var(--light);margin:0;padding:20px;}
.app {max-width:1200px;margin:auto;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
.header {background:var(--primary);color:#fff;padding:20px;display:flex;justify-content:space-between;}
.stats{display:flex;gap:10px;padding:15px}
.stat{flex:1;text-align:center;border:1px solid #eee;padding:10px;border-radius:10px}
.tools{padding:15px;display:flex;flex-wrap:wrap;gap:10px;background:#fafafa}
input{padding:10px;border-radius:8px;border:1px solid #ddd;flex:1}
.btn{padding:10px 15px;border:none;border-radius:8px;color:#fff;cursor:pointer}
.add{background:var(--accent)}
.printall{background:var(--primary)}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:right}
.status{padding:5px 10px;border-radius:20px;cursor:pointer}
.done{background:#55efc4}
.wait{background:#ffeaa7}

.ctrl{padding:5px 8px;border:none;color:#fff;border-radius:5px;cursor:pointer}

@media print{
.tools,.header,.stats,.ctrl,.status{display:none}
}
</style>
</head>

<body>

<div class="app">
<div class="header">
<h2>📦 شركة الاسبيرات</h2>
<div id="clock"></div>
</div>

<div class="stats">
<div class="stat">الإجمالي <b id="total">0</b></div>
<div class="stat" style="color:green">تمت <b id="done">0</b></div>
<div class="stat" style="color:red">لم تتم <b id="wait">0</b></div>
</div>

<div class="tools">
<input id="client" placeholder="اسم العميل">
<input id="note" placeholder="ملاحظات">
<button class="btn add" onclick="upload()">➕ إضافة</button>

<input id="search" placeholder="بحث..." onkeyup="search()">
<button class="btn printall" onclick="window.print()">🖨️ طباعة الكل</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>العميل</th>
<th>ملاحظات</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<script>
// Firebase
const firebaseConfig = {
apiKey:"AIzaSyBs3...",
authDomain:"pdfkk-33ecc.firebaseapp.com",
projectId:"pdfkk-33ecc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const stack = filestack.init("AnCRzgItUSXu9tSz5Apfjz");

// ساعة
setInterval(()=>{clock.innerText=new Date().toLocaleTimeString()},1000);

// رفع
function upload(){
let name=client.value.trim();
let note=noteInput.value.trim();

if(!name) return alert("اكتب اسم العميل");

document.body.style.opacity="0.5";

stack.picker({
accept:['.pdf'],
onFileUploadFinished:async(f)=>{
await db.collection("inv").add({
name, note, url:f.url, status:"wait",
created:new Date()
});
client.value=""; noteInput.value="";
document.body.style.opacity="1";
alert("تم الرفع ✅");
}
}).open();
}

// بحث
function search(){
let v=searchInput.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}

// طباعة ملف
function printFile(url){
let w=window.open(url);
w.onload=()=>setTimeout(()=>w.print(),500);
}

// تحميل
function download(url){
let a=document.createElement("a");
a.href=url;
a.download="file.pdf";
a.click();
}

// تغيير الحالة
function toggle(id,s){
db.collection("inv").doc(id).update({status:s=="wait"?"done":"wait"});
}

// حذف
function del(id){
if(confirm("حذف؟")) db.collection("inv").doc(id).delete();
}

// تعديل
function edit(id,n,nt){
let nn=prompt("اسم",n);
if(nn==null)return;
let nnt=prompt("ملاحظات",nt);
db.collection("inv").doc(id).update({name:nn,note:nnt});
}

// عرض البيانات
db.collection("inv").orderBy("created","desc").onSnapshot(s=>{
body.innerHTML="";
let d=0,i=1;

s.forEach(doc=>{
let x=doc.data();
if(x.status=="done")d++;

body.innerHTML+=`
<tr>
<td>${i++}</td>
<td>${x.name}</td>
<td>${x.note||"-"}</td>
<td><span class="status ${x.status}" onclick="toggle('${doc.id}','${x.status}')">
${x.status=="done"?"تمت":"لم تتم"}
</span></td>
<td>${x.created?.toDate?x.created.toDate().toLocaleDateString():"-"}</td>
<td>
<button class="ctrl" style="background:green" onclick="printFile('${x.url}')">🖨️</button>
<button class="ctrl" style="background:orange" onclick="download('${x.url}')">⬇️</button>
<button class="ctrl" style="background:blue" onclick="edit('${doc.id}','${x.name}','${x.note}')">✏️</button>
<button class="ctrl" style="background:red" onclick="del('${doc.id}')">🗑️</button>
</td>
</tr>
`;
});

total.innerText=s.size;
done.innerText=d;
wait.innerText=s.size-d;
});
</script>

</body>
</html>
